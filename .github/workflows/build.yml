name: Build APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.5'
          cache-read-only: false

      - name: Clean and Build Debug APK
        run: gradle clean assembleDebug --no-daemon --no-build-cache

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DbFtpManager-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Get current date
        id: date
        run: echo "date=$(date +'%Y%m%d_%H%M%S')" >> $GITHUB_OUTPUT

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.date.outputs.date }}
          name: DbFtpManager Build ${{ steps.date.outputs.date }}
          body: |
            DbFtpManager 自动构建版本
            - 构建时间: ${{ steps.date.outputs.date }}
            - 包含完整的 APK 文件，可直接下载安装
          files: app/build/outputs/apk/debug/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
